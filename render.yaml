services:
  - type: web
    name: sprout-smart-grid-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sprout-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: POSTGRES_SERVER
        value: localhost
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_DB
        value: agrolink

databases:
  - name: sprout-db
    databaseName: agrolink
    user: postgres
    plan: free
